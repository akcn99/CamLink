services:
  camlink-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: camlink-app
    ports:
      - "${CAMLINK_HTTP_PORT:-8083}:8083"
      - "${CAMLINK_RTSP_PORT:-5541}:5541"
    volumes:
      - ./config.json:/config/config.json
      - ./save:/app/save
    depends_on:
      - camlink-detector

  camlink-detector:
    build:
      context: ./services/detector
      dockerfile: Dockerfile
    container_name: camlink-detector
    environment:
      CAMLINK_DETECTOR_PORT: "8091"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
    ports:
      - "${CAMLINK_DETECTOR_HOST_PORT:-8091}:8091"
    volumes:
      - ./save:/data
